# bundle.lock.yaml — source of truth for the vendored Lovelace card bundle.
#
# This replaces HACS for GreenAutarky devices: instead of HACS downloading these
# cards from GitHub at runtime, we pin them here and vendor them at build time.
#
# To change a card:  edit its `version` + `url` (+ `source`), then run
#     python scripts/vendor.py --update
# which re-downloads, refreshes `sha256`, regenerates community/cards.json, and
# syncs the integration manifest version. CI runs `python scripts/vendor.py
# --check` and fails if the vendored files drift from these hashes.
#
# `source`:  release = GitHub release asset URL  |  raw = file committed at a tag
# `id`:      stable slug = on-disk subdir under custom_components/.../community/
# `file`:    served filename (and on-disk filename)

